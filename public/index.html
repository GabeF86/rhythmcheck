<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RhythmCheck" />
  <meta name="theme-color" content="#0a0e17" />
  <meta name="description" content="AI-powered EKG rhythm identification and ACLS treatment algorithms for anesthesiologists" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <title>RhythmCheck — EKG Interpreter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body {
      background: #0a0e17;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    @keyframes pulse-border { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes heartbeat { 0%, 100% { transform: scale(1); } 15% { transform: scale(1.15); } 30% { transform: scale(1); } 45% { transform: scale(1.1); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    input[type="file"] { display: none; }
    button { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    const RHYTHM_DATABASE = {
      "Normal Sinus Rhythm": {
        urgency: "none",
        treatment: ["No acute intervention required", "Continue routine monitoring"],
        drugs: [],
        orConsiderations: [
          "Verify rate 60–100 bpm and stable",
          "Ensure adequate anesthetic depth if tachycardic",
          "Document baseline rhythm",
        ],
      },
      "Sinus Tachycardia": {
        urgency: "low",
        treatment: [
          "Identify and treat underlying cause",
          "Consider: light anesthesia, pain, hypovolemia, hypoxia, hypercarbia, fever, medications",
          "Treat the cause, not the rate",
        ],
        drugs: [
          { name: "Esmolol", dose: "0.5 mg/kg IV bolus, then 50–200 mcg/kg/min infusion", note: "Only if cause addressed and rate still problematic" },
          { name: "Fentanyl", dose: "1–2 mcg/kg IV", note: "If pain/light anesthesia suspected" },
        ],
        orConsiderations: [
          "Most common cause intraop is light anesthesia or surgical stimulation",
          "Rule out hypovolemia — check blood loss, UOP, fluid balance",
          "Check end-tidal agent concentration",
          "Consider pneumothorax if unilateral breath sounds",
        ],
      },
      "Sinus Bradycardia": {
        urgency: "moderate",
        treatment: [
          "If hemodynamically stable — observe",
          "If symptomatic (hypotension, altered consciousness) — treat per ACLS",
          "Assess for reversible causes",
        ],
        drugs: [
          { name: "Atropine", dose: "0.5 mg IV, repeat q3–5 min (max 3 mg)", note: "First-line for symptomatic bradycardia" },
          { name: "Glycopyrrolate", dose: "0.2–0.4 mg IV", note: "Alternative — less CNS effects" },
          { name: "Epinephrine", dose: "2–10 mcg/min infusion", note: "If atropine ineffective" },
          { name: "Dopamine", dose: "5–20 mcg/kg/min infusion", note: "Alternative to epinephrine infusion" },
        ],
        orConsiderations: [
          "Common with high spinal/epidural, opioids, succinylcholine (especially repeat dose), dexmedetomidine",
          "Vagal reflexes from surgical stimulation (peritoneal traction, eye surgery, cervical dilation)",
          "Consider transcutaneous pacing if refractory",
          "Have push-dose epinephrine ready (10–20 mcg boluses)",
        ],
      },
      "Atrial Fibrillation": {
        urgency: "moderate",
        treatment: [
          "New onset vs. chronic? — check surgical/anesthesia history",
          "If hemodynamically unstable → synchronized cardioversion 120–200J biphasic",
          "If stable → rate control first",
          "If onset clearly < 48 hours → cardioversion may be considered",
        ],
        drugs: [
          { name: "Amiodarone", dose: "150 mg IV over 10 min, then 1 mg/min × 6 hrs, then 0.5 mg/min × 18 hrs", note: "Preferred in cardiac disease / reduced EF" },
          { name: "Diltiazem", dose: "0.25 mg/kg IV over 2 min (typically 15–20 mg), may repeat 0.35 mg/kg in 15 min", note: "Good first-line rate control if preserved EF" },
          { name: "Esmolol", dose: "500 mcg/kg IV bolus, then 50–200 mcg/kg/min", note: "Rapid onset/offset — good for OR" },
          { name: "Metoprolol", dose: "2.5–5 mg IV q5 min (max 15 mg)", note: "Longer-acting beta-blocker option" },
        ],
        orConsiderations: [
          "Most common perioperative arrhythmia",
          "Triggers: electrolyte abnormalities (Mg²⁺, K⁺), volume shifts, catecholamine surge",
          "Check Mg²⁺ — give 2g IV empirically if unknown",
          "Avoid cardioversion if onset > 48 hrs without TEE or anticoagulation",
          "Notify surgeon — may affect surgical plan",
        ],
      },
      "Atrial Flutter": {
        urgency: "moderate",
        treatment: [
          "If hemodynamically unstable → synchronized cardioversion 50–100J",
          "If stable → rate control (often harder than A-fib)",
          "Characteristic sawtooth pattern at ~300 bpm with 2:1, 3:1, or 4:1 block",
        ],
        drugs: [
          { name: "Diltiazem", dose: "0.25 mg/kg IV over 2 min", note: "Rate control" },
          { name: "Esmolol", dose: "500 mcg/kg bolus, then 50–200 mcg/kg/min", note: "Rate control" },
          { name: "Amiodarone", dose: "150 mg IV over 10 min", note: "May convert to sinus or slow rate" },
        ],
        orConsiderations: [
          "Often converts with low-energy cardioversion (50J)",
          "Rate control may be more difficult than A-fib",
          "Look for 2:1 conduction giving ventricular rate ~150 bpm",
          "Same anticoagulation considerations as A-fib for cardioversion",
        ],
      },
      "Supraventricular Tachycardia (SVT)": {
        urgency: "moderate",
        treatment: [
          "Vagal maneuvers (carotid massage if no bruit, Valsalva)",
          "If stable → adenosine",
          "If unstable → synchronized cardioversion 50–100J",
        ],
        drugs: [
          { name: "Adenosine", dose: "6 mg rapid IV push (large bore, proximal), follow with 20 mL flush. If no effect → 12 mg × 2", note: "First-line — diagnostic AND therapeutic. MUST be rapid push." },
          { name: "Diltiazem", dose: "0.25 mg/kg IV over 2 min", note: "If adenosine fails and stable" },
          { name: "Esmolol", dose: "500 mcg/kg bolus", note: "Alternative if adenosine contraindicated" },
          { name: "Phenylephrine", dose: "100–200 mcg IV bolus", note: "Raising BP may reflexively break SVT" },
        ],
        orConsiderations: [
          "Warn surgeon before giving adenosine — brief asystole expected",
          "Under anesthesia, phenylephrine-induced reflex may be blunted",
          "Light anesthesia and catecholamines are common triggers",
          "Record rhythm strip before and during treatment",
        ],
      },
      "Ventricular Tachycardia (Monomorphic)": {
        urgency: "high",
        treatment: [
          "Check for pulse immediately",
          "Pulseless VT → Begin CPR + defibrillation 120–200J biphasic (unsynchronized)",
          "VT with pulse, unstable → synchronized cardioversion 100J",
          "VT with pulse, stable → amiodarone",
        ],
        drugs: [
          { name: "Amiodarone", dose: "150 mg IV over 10 min, may repeat × 1. Then 1 mg/min infusion", note: "First-line antiarrhythmic for stable VT" },
          { name: "Lidocaine", dose: "1–1.5 mg/kg IV bolus, then 1–4 mg/min infusion", note: "Alternative if amiodarone unavailable" },
          { name: "Procainamide", dose: "20–50 mg/min IV until arrhythmia suppressed (max 17 mg/kg)", note: "Use with caution — can cause hypotension" },
          { name: "Magnesium", dose: "2 g IV over 5–10 min", note: "Especially if hypomagnesemia suspected" },
          { name: "Epinephrine", dose: "1 mg IV q3–5 min", note: "For pulseless VT — per ACLS" },
        ],
        orConsiderations: [
          "CALL FOR HELP immediately",
          "Central line access preferred for amiodarone (peripheral can cause phlebitis)",
          "Consider ischemia — notify cardiologist / activate cath lab if needed",
          "Check K⁺ and Mg²⁺ — correct aggressively",
          "Surgeon should stop procedure if possible",
          "Consider whether volatile anesthetic is contributing (halothane > others for arrhythmogenicity)",
        ],
      },
      "Ventricular Tachycardia (Polymorphic / Torsades de Pointes)": {
        urgency: "critical",
        treatment: [
          "Pulseless → immediate defibrillation (unsynchronized) 120–200J",
          "With pulse → IV magnesium is first-line",
          "Do NOT use synchronized cardioversion for polymorphic VT",
          "Identify and correct prolonged QT",
        ],
        drugs: [
          { name: "Magnesium Sulfate", dose: "2 g IV over 1–2 min (can push faster if pulseless)", note: "FIRST-LINE for Torsades — give even if Mg²⁺ level normal" },
          { name: "Isoproterenol", dose: "2–10 mcg/min infusion", note: "Increases HR to shorten QT — bridge to pacing" },
          { name: "Epinephrine", dose: "1 mg IV q3–5 min", note: "For pulseless arrest" },
        ],
        orConsiderations: [
          "STOP any QT-prolonging agents (ondansetron, droperidol, sevoflurane at high concentrations)",
          "Overdrive pacing at 100 bpm shortens QT and suppresses Torsades",
          "Check medication list — many anesthetic adjuncts prolong QT",
          "Amiodarone may worsen Torsades (prolongs QT) — use magnesium instead",
          "Correct hypokalemia to > 4.0 mEq/L",
        ],
      },
      "Ventricular Fibrillation": {
        urgency: "critical",
        treatment: [
          "Immediate CPR",
          "Defibrillation 120–200J biphasic (UNSYNCHRONIZED) as soon as possible",
          "Resume CPR immediately for 2 minutes after shock",
          "Follow ACLS pulseless arrest algorithm",
        ],
        drugs: [
          { name: "Epinephrine", dose: "1 mg IV q3–5 min", note: "Give after 2nd shock" },
          { name: "Amiodarone", dose: "300 mg IV bolus (first dose), 150 mg (second dose)", note: "Give after 3rd shock" },
          { name: "Lidocaine", dose: "1–1.5 mg/kg first dose, 0.5–0.75 mg/kg additional", note: "Alternative to amiodarone" },
        ],
        orConsiderations: [
          "CALL CODE — get crash cart and defibrillator",
          "Turn OFF volatile anesthetics",
          "Switch to 100% O₂",
          "Surgeon must stop — manual internal cardiac massage if chest/abdomen open",
          "Internal defibrillation paddles: 10–20J if chest is open",
          "Consider causes: ischemia, electrolytes, tension pneumothorax, local anesthetic toxicity",
        ],
      },
      "Asystole / PEA": {
        urgency: "critical",
        treatment: [
          "Begin CPR immediately",
          "Do NOT defibrillate asystole",
          "Identify and treat reversible causes (H's and T's)",
          "H's: Hypovolemia, Hypoxia, Hydrogen ion (acidosis), Hypo/Hyperkalemia, Hypothermia",
          "T's: Tension pneumothorax, Tamponade, Toxins, Thrombosis (coronary/pulmonary)",
        ],
        drugs: [
          { name: "Epinephrine", dose: "1 mg IV q3–5 min", note: "As soon as IV/IO access" },
        ],
        orConsiderations: [
          "CALL CODE — full resuscitation team",
          "Turn OFF all anesthetics, switch to 100% O₂",
          "In the OR, think LOCAL ANESTHETIC TOXICITY → Intralipid 20% bolus 1.5 mL/kg",
          "Rapid surgical bleeding → massive transfusion protocol",
          "Consider surgical cause: cement reaction (orthopedic), air embolism, IVC compression",
          "Check ETCO₂ — goal > 10 mmHg with good CPR, rising ETCO₂ = ROSC",
        ],
      },
      "First-Degree AV Block": {
        urgency: "none",
        treatment: [
          "Usually benign — observe",
          "PR interval > 200 ms but all P-waves conducted",
          "No specific treatment needed unless symptomatic",
        ],
        drugs: [],
        orConsiderations: [
          "Common with increased vagal tone, beta-blockers, calcium channel blockers, dexmedetomidine",
          "Monitor for progression to higher-degree block",
          "Document and communicate during handoff",
        ],
      },
      "Second-Degree AV Block (Type I / Wenckebach)": {
        urgency: "low",
        treatment: [
          "Usually benign — observe",
          "Progressive PR prolongation until dropped beat",
          "Rarely requires treatment unless symptomatic",
        ],
        drugs: [
          { name: "Atropine", dose: "0.5 mg IV", note: "Only if symptomatic bradycardia" },
        ],
        orConsiderations: [
          "May occur with high vagal tone or inferior MI",
          "Generally does not progress to complete heart block",
          "Reduce or hold AV-nodal blocking agents if contributing",
        ],
      },
      "Second-Degree AV Block (Type II / Mobitz II)": {
        urgency: "high",
        treatment: [
          "More serious than Type I — can progress to complete heart block",
          "Constant PR interval with intermittent dropped QRS",
          "Prepare for transcutaneous pacing",
          "Cardiology consult — likely needs permanent pacemaker",
        ],
        drugs: [
          { name: "Atropine", dose: "0.5 mg IV", note: "May not be effective — block is below AV node" },
          { name: "Dopamine", dose: "5–20 mcg/kg/min", note: "If pacing not immediately available" },
          { name: "Epinephrine", dose: "2–10 mcg/min", note: "Temporizing measure" },
        ],
        orConsiderations: [
          "Have transcutaneous pacer pads on patient",
          "Atropine may paradoxically worsen (increases atrial rate without improving conduction)",
          "Consider delaying elective surgery until pacemaker placed",
          "If emergent — transvenous pacing may be needed",
        ],
      },
      "Third-Degree (Complete) Heart Block": {
        urgency: "critical",
        treatment: [
          "No atrial impulses conducted to ventricles",
          "Ventricular escape rhythm — wide QRS, rate 20–40 bpm",
          "Transcutaneous pacing immediately if symptomatic",
          "Prepare for transvenous pacing",
        ],
        drugs: [
          { name: "Atropine", dose: "0.5 mg IV", note: "May try but often ineffective in complete block" },
          { name: "Epinephrine", dose: "2–10 mcg/min infusion", note: "Bridge to pacing" },
          { name: "Dopamine", dose: "5–20 mcg/kg/min", note: "Alternative bridge to pacing" },
          { name: "Isoproterenol", dose: "2–10 mcg/min", note: "Increases ventricular rate — temporizing only" },
        ],
        orConsiderations: [
          "CALL FOR HELP — cardiology for transvenous pacer",
          "Apply transcutaneous pacer immediately (may need sedation — patient is already anesthetized)",
          "Verify capture — mechanical pulse with each pacer spike",
          "Consider causes: surgical damage (cardiac surgery), high spinal, hyperkalemia",
          "Severely hyperkalemic patients may mimic complete heart block — give calcium chloride 1g IV",
        ],
      },
      "Hyperkalemia Pattern": {
        urgency: "high",
        treatment: [
          "Peaked T-waves → widened QRS → sine wave → VF/asystole",
          "STAT potassium level — but treat empirically if EKG changes present",
          "Stabilize membrane → shift K⁺ intracellular → remove K⁺ from body",
        ],
        drugs: [
          { name: "Calcium Chloride", dose: "1 g (10 mL of 10%) IV over 2–3 min", note: "FIRST — stabilizes myocardium. Can repeat in 5 min." },
          { name: "Calcium Gluconate", dose: "3 g IV over 5 min", note: "Alternative if no central line (less caustic)" },
          { name: "Insulin (Regular)", dose: "10 units IV + D50 50 mL (25 g)", note: "Shifts K⁺ intracellular — onset 15–30 min" },
          { name: "Sodium Bicarbonate", dose: "50 mEq IV", note: "If metabolic acidosis present" },
          { name: "Albuterol", dose: "10–20 mg nebulized", note: "Shifts K⁺ — additive with insulin" },
        ],
        orConsiderations: [
          "STOP all potassium infusions immediately",
          "Common after massive transfusion, tourniquet release, reperfusion, renal failure, succinylcholine in susceptible patients",
          "Calcium works in 1–3 minutes — give first while preparing other treatments",
          "Avoid succinylcholine in known hyperkalemia, burns, crush injuries, denervation",
          "Notify surgeon — may need to adjust surgical plan",
        ],
      },
      "Local Anesthetic Systemic Toxicity (LAST)": {
        urgency: "critical",
        treatment: [
          "May present as arrhythmia, seizures, or cardiovascular collapse",
          "STOP local anesthetic injection",
          "Call for help + get Intralipid",
          "Follow ASRA LAST checklist",
        ],
        drugs: [
          { name: "Intralipid 20%", dose: "1.5 mL/kg IV bolus over 1 min, then 0.25 mL/kg/min infusion. May repeat bolus × 2. Max total ~12 mL/kg", note: "FIRST-LINE — lipid emulsion therapy" },
          { name: "Epinephrine", dose: "≤ 1 mcg/kg IV bolus (SMALL doses)", note: "Avoid large doses — impairs lipid rescue" },
        ],
        orConsiderations: [
          "AVOID propofol (lipid content not therapeutic, and it's a cardiac depressant)",
          "AVOID vasopressin, calcium channel blockers, beta-blockers, local anesthetics",
          "Use SMALL-dose epinephrine only (< 1 mcg/kg)",
          "Prolonged CPR may be needed — do not terminate early",
          "Keep Intralipid on or near every regional anesthesia cart",
          "After ROSC: monitor for recurrence for ≥ 12 hours",
        ],
      },
    };

    const URGENCY_CONFIG = {
      none: { label: "NORMAL", color: "#22c55e", bg: "rgba(34,197,94,0.1)", border: "rgba(34,197,94,0.3)" },
      low: { label: "LOW URGENCY", color: "#eab308", bg: "rgba(234,179,8,0.1)", border: "rgba(234,179,8,0.3)" },
      moderate: { label: "MODERATE", color: "#f97316", bg: "rgba(249,115,22,0.1)", border: "rgba(249,115,22,0.3)" },
      high: { label: "HIGH URGENCY", color: "#ef4444", bg: "rgba(239,68,68,0.1)", border: "rgba(239,68,68,0.3)" },
      critical: { label: "CRITICAL", color: "#ff0040", bg: "rgba(255,0,64,0.12)", border: "rgba(255,0,64,0.4)" },
    };

    const EKG_SYSTEM_PROMPT = `You are an expert cardiac electrophysiology consultant assisting an anesthesiologist in the operating room. You are analyzing a photograph of an EKG/cardiac monitor display.

TASK: Identify the cardiac rhythm shown in the image.

You MUST respond with ONLY a valid JSON object (no markdown, no backticks, no explanation outside the JSON). Use this exact format:

{
  "rhythm": "<exact rhythm name from the list below>",
  "confidence": "<high|moderate|low>",
  "reasoning": "<brief 1-2 sentence explanation of the key features you identified>",
  "rate_estimate": "<estimated heart rate or range>",
  "key_features": ["<feature 1>", "<feature 2>", "<feature 3>"]
}

VALID RHYTHM NAMES (use EXACTLY one of these):
- Normal Sinus Rhythm
- Sinus Tachycardia
- Sinus Bradycardia
- Atrial Fibrillation
- Atrial Flutter
- Supraventricular Tachycardia (SVT)
- Ventricular Tachycardia (Monomorphic)
- Ventricular Tachycardia (Polymorphic / Torsades de Pointes)
- Ventricular Fibrillation
- Asystole / PEA
- First-Degree AV Block
- Second-Degree AV Block (Type I / Wenckebach)
- Second-Degree AV Block (Type II / Mobitz II)
- Third-Degree (Complete) Heart Block
- Hyperkalemia Pattern
- Local Anesthetic Systemic Toxicity (LAST)

ANALYSIS APPROACH:
1. Assess rate (fast/normal/slow)
2. Assess regularity (regular/irregular)
3. Assess QRS width (narrow/wide)
4. Look for P-waves and their relationship to QRS
5. Look for characteristic patterns (sawtooth, peaked T-waves, polymorphic, etc.)

If the image is unclear or not an EKG, respond with:
{"rhythm": "UNREADABLE", "confidence": "low", "reasoning": "explanation of why", "rate_estimate": "unknown", "key_features": []}`;

    function App() {
      const [screen, setScreen] = useState("home");
      const [capturedImage, setCapturedImage] = useState(null);
      const [analyzing, setAnalyzing] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [expandedSection, setExpandedSection] = useState(null);
      const cameraInputRef = useRef(null);
      const fileInputRef = useRef(null);

      const handleFileUpload = useCallback((e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          setCapturedImage(ev.target.result);
          setScreen("preview");
        };
        reader.readAsDataURL(file);
        // Reset input so same file can be re-selected
        e.target.value = '';
      }, []);

      const analyzeImage = useCallback(async () => {
        if (!capturedImage) return;
        setAnalyzing(true);
        setError(null);
        setScreen("analyzing");

        try {
          const base64Data = capturedImage.split(",")[1];
          const mediaType = capturedImage.split(";")[0].split(":")[1] || "image/jpeg";

          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: EKG_SYSTEM_PROMPT,
              messages: [
                {
                  role: "user",
                  content: [
                    { type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } },
                    { type: "text", text: "Analyze this EKG/cardiac monitor image and identify the rhythm. Respond with JSON only." },
                  ],
                },
              ],
            }),
          });

          const data = await response.json();
          const text = data.content?.map((i) => i.text || "").join("") || "";
          const clean = text.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(clean);

          if (parsed.rhythm === "UNREADABLE") {
            setError("Could not interpret the image. Please try again with a clearer photo of the EKG monitor.");
            setScreen("preview");
          } else {
            const rhythmData = RHYTHM_DATABASE[parsed.rhythm];
            if (rhythmData) {
              setResult({ ...parsed, ...rhythmData });
              setScreen("result");
            } else {
              setResult({
                ...parsed,
                treatment: ["Consult rhythm-specific ACLS guidelines"],
                drugs: [],
                orConsiderations: ["Rhythm identified but not in quick-reference database"],
                urgency: "moderate",
              });
              setScreen("result");
            }
          }
        } catch (err) {
          setError("Analysis failed. Please check your connection and try again.");
          setScreen("preview");
        } finally {
          setAnalyzing(false);
        }
      }, [capturedImage]);

      const reset = useCallback(() => {
        setCapturedImage(null);
        setResult(null);
        setError(null);
        setExpandedSection(null);
        setScreen("home");
      }, []);

      const urgency = result ? URGENCY_CONFIG[result.urgency] || URGENCY_CONFIG.moderate : null;

      return (
        <div style={{ minHeight: "100vh", background: "#0a0e17", position: "relative", overflow: "hidden" }}>
          {/* Hidden file inputs - one for camera, one for photo library */}
          <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" onChange={handleFileUpload} />
          <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFileUpload} />

          {/* Header Bar */}
          <div style={{
            position: "sticky", top: 0, zIndex: 100,
            background: "linear-gradient(180deg, rgba(10,14,23,0.98) 0%, rgba(10,14,23,0.9) 100%)",
            backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
            borderBottom: "1px solid rgba(255,255,255,0.06)",
            padding: "max(env(safe-area-inset-top, 12px), 12px) 20px 12px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: "10px", cursor: "pointer" }} onClick={reset}>
              <div style={{
                width: 32, height: 32, borderRadius: 8,
                background: "linear-gradient(135deg, #1e40af, #3b82f6)",
                display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16,
              }}>♡</div>
              <div>
                <div style={{ fontFamily: "Inter, sans-serif", fontWeight: 800, fontSize: 14, color: "#f8fafc", letterSpacing: "-0.02em" }}>RhythmCheck</div>
                <div style={{ fontSize: 9, color: "#64748b", letterSpacing: "0.1em", textTransform: "uppercase" }}>EKG Interpreter</div>
              </div>
            </div>
            {screen !== "home" && (
              <button onClick={reset} style={{
                background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)",
                color: "#94a3b8", borderRadius: 8, padding: "6px 14px", cursor: "pointer",
                fontFamily: "Inter, sans-serif", fontSize: 12, fontWeight: 500,
              }}>
                ← New Scan
              </button>
            )}
          </div>

          {/* HOME SCREEN */}
          {screen === "home" && (
            <div style={{ padding: "40px 20px", maxWidth: 480, margin: "0 auto", animation: "fadeUp 0.4s ease" }}>
              <div style={{
                background: "rgba(234,179,8,0.08)", border: "1px solid rgba(234,179,8,0.2)",
                borderRadius: 12, padding: "14px 16px", marginBottom: 32,
                display: "flex", gap: 10, alignItems: "flex-start",
              }}>
                <span style={{ fontSize: 18, lineHeight: 1.2 }}>⚠</span>
                <div style={{ fontFamily: "Inter, sans-serif", fontSize: 12, color: "#eab308", lineHeight: 1.5 }}>
                  <strong>Clinical Reference Tool Only.</strong> Not a diagnostic device. Not FDA-cleared. Always use clinical judgment. AI interpretation may be incorrect.
                </div>
              </div>

              <div style={{ textAlign: "center", marginBottom: 48 }}>
                <div style={{
                  width: 88, height: 88, borderRadius: 24, margin: "0 auto 24px",
                  background: "linear-gradient(135deg, #1e3a8a, #2563eb, #3b82f6)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 40, animation: "heartbeat 2s ease infinite",
                  boxShadow: "0 0 40px rgba(37,99,235,0.3)",
                }}>♡</div>
                <h1 style={{
                  fontFamily: "Inter, sans-serif", fontSize: 28, fontWeight: 900,
                  color: "#f8fafc", letterSpacing: "-0.03em", marginBottom: 12,
                }}>Snap. Identify. Treat.</h1>
                <p style={{
                  fontFamily: "Inter, sans-serif", fontSize: 15, color: "#64748b",
                  lineHeight: 1.6, maxWidth: 340, margin: "0 auto",
                }}>Point your camera at the EKG monitor. Get rhythm identification and treatment algorithms in seconds.</p>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <button onClick={() => cameraInputRef.current?.click()} style={{
                  width: "100%", padding: "18px 24px",
                  background: "linear-gradient(135deg, #1e40af, #2563eb)",
                  border: "none", borderRadius: 16, cursor: "pointer",
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 12,
                  fontFamily: "Inter, sans-serif", fontSize: 16, fontWeight: 700, color: "#fff",
                  boxShadow: "0 4px 24px rgba(37,99,235,0.3)",
                }}>📷 Open Camera</button>
                <button onClick={() => fileInputRef.current?.click()} style={{
                  width: "100%", padding: "16px 24px",
                  background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)",
                  borderRadius: 16, cursor: "pointer",
                  fontFamily: "Inter, sans-serif", fontSize: 14, fontWeight: 600, color: "#94a3b8",
                }}>📁 Upload Photo</button>
              </div>

              <div style={{ marginTop: 48 }}>
                <div style={{
                  fontFamily: "Inter, sans-serif", fontSize: 11, fontWeight: 600,
                  color: "#475569", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 16,
                }}>{Object.keys(RHYTHM_DATABASE).length} Rhythms Supported</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {Object.entries(RHYTHM_DATABASE).map(([name, data]) => (
                    <span key={name} style={{
                      fontFamily: "Inter, sans-serif", fontSize: 11, padding: "4px 10px",
                      borderRadius: 6, background: URGENCY_CONFIG[data.urgency].bg,
                      border: `1px solid ${URGENCY_CONFIG[data.urgency].border}`,
                      color: URGENCY_CONFIG[data.urgency].color,
                    }}>{name}</span>
                  ))}
                </div>
              </div>

              {error && (
                <div style={{
                  marginTop: 20, padding: "12px 16px", borderRadius: 10,
                  background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.2)",
                  fontFamily: "Inter, sans-serif", fontSize: 13, color: "#ef4444",
                }}>{error}</div>
              )}
            </div>
          )}

          {/* PREVIEW SCREEN */}
          {screen === "preview" && capturedImage && (
            <div style={{ padding: "24px 20px", maxWidth: 480, margin: "0 auto", animation: "fadeUp 0.3s ease" }}>
              <div style={{
                borderRadius: 16, overflow: "hidden", marginBottom: 20,
                border: "1px solid rgba(255,255,255,0.1)",
              }}>
                <img src={capturedImage} alt="Captured EKG" style={{ width: "100%", display: "block" }} />
              </div>
              {error && (
                <div style={{
                  marginBottom: 16, padding: "12px 16px", borderRadius: 10,
                  background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.2)",
                  fontFamily: "Inter, sans-serif", fontSize: 13, color: "#ef4444",
                }}>{error}</div>
              )}
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={analyzeImage} style={{
                  flex: 1, padding: "16px",
                  background: "linear-gradient(135deg, #1e40af, #2563eb)",
                  border: "none", borderRadius: 14, cursor: "pointer",
                  fontFamily: "Inter, sans-serif", fontSize: 15, fontWeight: 700, color: "#fff",
                  boxShadow: "0 4px 24px rgba(37,99,235,0.3)",
                }}>⚡ Analyze Rhythm</button>
                <button onClick={() => { setCapturedImage(null); setError(null); cameraInputRef.current?.click(); }} style={{
                  padding: "16px 20px",
                  background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)",
                  borderRadius: 14, cursor: "pointer",
                  fontFamily: "Inter, sans-serif", fontSize: 14, fontWeight: 600, color: "#94a3b8",
                }}>Retake</button>
              </div>
            </div>
          )}

          {/* ANALYZING SCREEN */}
          {screen === "analyzing" && (
            <div style={{
              padding: "80px 20px", maxWidth: 480, margin: "0 auto",
              display: "flex", flexDirection: "column", alignItems: "center",
              animation: "fadeUp 0.3s ease",
            }}>
              <div style={{
                width: 64, height: 64, borderRadius: 16,
                background: "linear-gradient(135deg, #1e3a8a, #2563eb)",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 28, marginBottom: 24, animation: "heartbeat 1s ease infinite",
              }}>♡</div>
              <div style={{ fontFamily: "Inter, sans-serif", fontSize: 18, fontWeight: 700, color: "#f8fafc", marginBottom: 8 }}>Analyzing Rhythm…</div>
              <div style={{ fontFamily: "Inter, sans-serif", fontSize: 13, color: "#64748b", marginBottom: 32 }}>AI is interpreting the EKG pattern</div>
              <div style={{ width: 200, height: 4, borderRadius: 2, overflow: "hidden", background: "rgba(255,255,255,0.06)" }}>
                <div style={{
                  width: "100%", height: "100%",
                  background: "linear-gradient(90deg, transparent, #3b82f6, transparent)",
                  backgroundSize: "200% 100%", animation: "shimmer 1.5s ease infinite",
                }} />
              </div>
            </div>
          )}

          {/* RESULT SCREEN */}
          {screen === "result" && result && (
            <div style={{ padding: "20px", maxWidth: 520, margin: "0 auto", paddingBottom: 40, animation: "fadeUp 0.3s ease" }}>
              <div style={{
                background: urgency.bg, border: `2px solid ${urgency.border}`,
                borderRadius: 16, padding: "20px", marginBottom: 16, textAlign: "center",
                ...(result.urgency === "critical" ? { animation: "pulse-border 1.5s ease infinite" } : {}),
              }}>
                <div style={{
                  fontFamily: "Inter, sans-serif", fontSize: 11, fontWeight: 700,
                  color: urgency.color, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 8,
                }}>{urgency.label}</div>
                <div style={{
                  fontFamily: "Inter, sans-serif", fontSize: 22, fontWeight: 900,
                  color: "#f8fafc", letterSpacing: "-0.02em", lineHeight: 1.2,
                }}>{result.rhythm}</div>
                <div style={{ fontFamily: "Inter, sans-serif", fontSize: 13, color: "#94a3b8", marginTop: 8 }}>
                  Rate: {result.rate_estimate} &nbsp;•&nbsp; Confidence: {result.confidence}
                </div>
              </div>

              <div style={{
                background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)",
                borderRadius: 12, padding: "14px 16px", marginBottom: 16,
              }}>
                <div style={{ fontFamily: "Inter, sans-serif", fontSize: 11, fontWeight: 600, color: "#64748b", marginBottom: 6, letterSpacing: "0.05em", textTransform: "uppercase" }}>AI Analysis</div>
                <div style={{ fontFamily: "Inter, sans-serif", fontSize: 13, color: "#cbd5e1", lineHeight: 1.6 }}>{result.reasoning}</div>
                {result.key_features?.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
                    {result.key_features.map((f, i) => (
                      <span key={i} style={{
                        fontFamily: "Inter, sans-serif", fontSize: 11, padding: "3px 8px",
                        borderRadius: 4, background: "rgba(59,130,246,0.1)",
                        border: "1px solid rgba(59,130,246,0.2)", color: "#60a5fa",
                      }}>{f}</span>
                    ))}
                  </div>
                )}
              </div>

              {[
                { key: "treatment", title: "ACLS Treatment Algorithm", icon: "🔷", items: result.treatment, type: "steps" },
                { key: "drugs", title: "Drug Doses", icon: "💊", items: result.drugs, type: "drugs" },
                { key: "or", title: "OR-Specific Considerations", icon: "🏥", items: result.orConsiderations, type: "list" },
              ].map(({ key, title, icon, items, type }) => (
                items && items.length > 0 && (
                  <div key={key} style={{
                    background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)",
                    borderRadius: 14, marginBottom: 10, overflow: "hidden",
                  }}>
                    <button onClick={() => setExpandedSection(expandedSection === key ? null : key)} style={{
                      width: "100%", padding: "16px", background: "none", border: "none",
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                      cursor: "pointer", color: "#e2e8f0",
                    }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ fontSize: 18 }}>{icon}</span>
                        <span style={{ fontFamily: "Inter, sans-serif", fontSize: 14, fontWeight: 700, letterSpacing: "-0.01em" }}>{title}</span>
                      </div>
                      <span style={{
                        fontSize: 18, color: "#64748b",
                        transform: expandedSection === key ? "rotate(180deg)" : "rotate(0deg)",
                        transition: "transform 0.2s",
                      }}>⌄</span>
                    </button>
                    {expandedSection === key && (
                      <div style={{ padding: "0 16px 16px", animation: "fadeUp 0.2s ease" }}>
                        {type === "steps" && items.map((step, i) => (
                          <div key={i} style={{ display: "flex", gap: 12, marginBottom: 10, alignItems: "flex-start" }}>
                            <div style={{
                              minWidth: 24, height: 24, borderRadius: 7,
                              background: "rgba(59,130,246,0.15)", border: "1px solid rgba(59,130,246,0.3)",
                              display: "flex", alignItems: "center", justifyContent: "center",
                              fontFamily: "Inter, sans-serif", fontSize: 11, fontWeight: 700, color: "#60a5fa",
                            }}>{i + 1}</div>
                            <div style={{ fontFamily: "Inter, sans-serif", fontSize: 13, color: "#cbd5e1", lineHeight: 1.5, paddingTop: 2 }}>{step}</div>
                          </div>
                        ))}
                        {type === "drugs" && items.map((drug, i) => (
                          <div key={i} style={{
                            background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)",
                            borderRadius: 10, padding: "12px 14px", marginBottom: 8,
                          }}>
                            <div style={{ fontFamily: "Inter, sans-serif", fontSize: 14, fontWeight: 700, color: "#f8fafc", marginBottom: 4 }}>{drug.name}</div>
                            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: "#60a5fa", marginBottom: 6, lineHeight: 1.4 }}>{drug.dose}</div>
                            {drug.note && (
                              <div style={{ fontFamily: "Inter, sans-serif", fontSize: 12, color: "#94a3b8", fontStyle: "italic", lineHeight: 1.4 }}>{drug.note}</div>
                            )}
                          </div>
                        ))}
                        {type === "list" && items.map((item, i) => (
                          <div key={i} style={{ display: "flex", gap: 10, marginBottom: 8, alignItems: "flex-start" }}>
                            <span style={{ color: urgency.color, fontSize: 8, marginTop: 6 }}>●</span>
                            <span style={{ fontFamily: "Inter, sans-serif", fontSize: 13, color: "#cbd5e1", lineHeight: 1.5 }}>{item}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )
              ))}

              {capturedImage && (
                <div style={{ marginTop: 16 }}>
                  <div style={{
                    fontFamily: "Inter, sans-serif", fontSize: 11, fontWeight: 600,
                    color: "#475569", marginBottom: 8, letterSpacing: "0.05em", textTransform: "uppercase",
                  }}>Analyzed Image</div>
                  <img src={capturedImage} alt="Analyzed EKG" style={{
                    width: "100%", borderRadius: 12, border: "1px solid rgba(255,255,255,0.08)",
                  }} />
                </div>
              )}

              <div style={{
                marginTop: 24, padding: "12px 14px", borderRadius: 10,
                background: "rgba(234,179,8,0.06)", border: "1px solid rgba(234,179,8,0.15)",
                fontFamily: "Inter, sans-serif", fontSize: 11, color: "#a3870a", lineHeight: 1.5, textAlign: "center",
              }}>
                ⚠ AI-assisted interpretation — not a substitute for clinical judgment. Always correlate with patient assessment.
              </div>
            </div>
          )}
        </div>
      );
    }

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
